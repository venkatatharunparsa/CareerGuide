# Local dev: docker compose -f docker-compose.local.yml up --build
# VITE_API_URL is baked at frontend image build time (see build.args).
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: job_agent_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app:/workspace
      - CHROMA_PERSIST_PATH=/chroma_db
    volumes:
      - ./agents:/workspace/agents
      - ./rag:/workspace/rag
      - ./scraper:/workspace/scraper
      - chroma_data:/chroma_db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: job_agent_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
