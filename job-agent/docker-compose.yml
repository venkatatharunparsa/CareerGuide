services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: job_agent_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app:/workspace
      - CHROMA_PERSIST_PATH=/chroma_db
      - SQLITE_DB_PATH=/chroma_db/jobagent.db
    volumes:
      - ./agents:/workspace/agents
      - ./rag:/workspace/rag
      - ./scraper:/workspace/scraper
      - chroma_data:/chroma_db
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: job_agent_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
